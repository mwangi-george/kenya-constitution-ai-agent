server {
  # Listen for incoming HTTP traffic on port 80 (default web port)
  listen 80;

  # Define the root directory where static files are served from
  root /usr/share/nginx/html;

  # Default file to serve when a directory is requested
  index index.html;

  location / {
    # Try to serve the exact requested file (e.g., /assets/app.js)
    # If the file is not found, fall back to /index.html
    # This is essential for SPA (Single Page Applications) like React,
    # where routing is handled client-side
    try_files $uri /index.html;
  }

  # Enable gzip compression to reduce response size and improve performance
  gzip on;

  # Specify which MIME types should be compressed
  # These are typically text-based assets that benefit from compression
  gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    image/svg+xml;

  # Only compress responses larger than 256 bytes
  # Helps avoid unnecessary overhead for very small files
  gzip_min_length 256;
}